<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkie — Witch's Tower</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050208; font-family: 'Georgia', serif; }
    canvas { display: block; }
    #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(150,100,200,0.4); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; opacity: 1; transition: opacity 2s ease; }
    #title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(130,80,180,0.4); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">🧙‍♀️ WITCH'S TOWER 🔮</div>
<div id="hint">drag to orbit</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050208);
scene.fog = new THREE.FogExp2(0x050208, 0.018);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 15, 40);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.08;
controls.maxPolarAngle = Math.PI * 0.6;
controls.minDistance = 5;
controls.maxDistance = 70;

const composer = new EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.2, 0.4, 0.05));

scene.add(new THREE.AmbientLight(0x080510, 0.2));

const stoneMat = new THREE.MeshStandardMaterial({ color: 0x1a1520, roughness: 0.9 });
const woodMat = new THREE.MeshStandardMaterial({ color: 0x2a1510, roughness: 0.85 });
const purpleGlow = new THREE.MeshStandardMaterial({ color: 0x8800ff, emissive: 0x6600cc, emissiveIntensity: 2.0 });

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80, 40, 40),
  new THREE.MeshStandardMaterial({ color: 0x0a0510, roughness: 0.95 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Tower base
const base = new THREE.Mesh(new THREE.CylinderGeometry(6, 7, 5, 8), stoneMat);
base.position.y = 2.5;
scene.add(base);

// Tower shaft
const shaft = new THREE.Mesh(new THREE.CylinderGeometry(5, 6, 25, 8), stoneMat);
shaft.position.y = 17.5;
scene.add(shaft);

// Tower mid section
const mid = new THREE.Mesh(new THREE.CylinderGeometry(6, 5, 5, 8), stoneMat);
mid.position.y = 32.5;
scene.add(mid);

// Upper tower
const upper = new THREE.Mesh(new THREE.CylinderGeometry(5, 6, 8, 8), stoneMat);
upper.position.y = 39;
scene.add(upper);

// Conical roof
const roof = new THREE.Mesh(new THREE.ConeGeometry(7, 12, 8), new THREE.MeshStandardMaterial({ color: 0x1a0a20, roughness: 0.9 }));
roof.position.y = 49;
scene.add(roof);

// Spire on roof
const spire = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 8, 8), stoneMat);
spire.position.y = 57;
scene.add(spire);

// Magic orb at top
const orb = new THREE.Mesh(
  new THREE.SphereGeometry(1, 16, 16),
  purpleGlow
);
orb.position.y = 62;
scene.add(orb);

const orbLight = new THREE.PointLight(0xaa44ff, 5, 20);
orbLight.position.y = 62;
scene.add(orbLight);

// Windows with purple glow
for (let w = 0; w < 20; w++) {
  const wy = 5 + w * 3;
  const angle = (w % 2) * Math.PI;
  
  const win = new THREE.Mesh(
    new THREE.CircleGeometry(1, 12),
    purpleGlow
  );
  win.position.set(Math.cos(angle) * 5.1, wy, Math.sin(angle) * 5.1);
  win.rotation.y = -angle;
  scene.add(win);
  
  const wLight = new THREE.PointLight(0x8800ff, 1.5, 8);
  wLight.position.set(Math.cos(angle) * 6, wy, Math.sin(angle) * 6);
  scene.add(wLight);
}

// Spiral staircase visible through windows
for (let s = 0; s < 15; s++) {
  const angle = (s / 15) * Math.PI * 2;
  const stair = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, 0.3, 2),
    new THREE.MeshStandardMaterial({ color: 0x2a2020 })
  );
  stair.position.set(Math.cos(angle) * 3, 2 + s * 1.8, Math.sin(angle) * 3);
  stair.rotation.y = -angle + 0.5;
  scene.add(stair);
}

// Stone balcony at mid level
for (let b = 0; b < 4; b++) {
  const angle = (b / 4) * Math.PI * 2;
  const balustrade = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1.5, 3),
    stoneMat
  );
  balustrade.position.set(Math.cos(angle) * 7, 34, Math.sin(angle) * 7);
  balustrade.rotation.y = -angle;
  scene.add(balustrade);
}

// Cauldron at base
const cauldron = new THREE.Mesh(
  new THREE.SphereGeometry(1.5, 12, 12),
  new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.7 })
);
cauldron.position.set(8, 1.5, 5);
cauldron.scale.y = 0.7;
scene.add(cauldron);

// Cauldron bubbles
const bubbleCount = 40;
const bubblePos = new Float32Array(bubbleCount * 3);
for (let i = 0; i < bubbleCount; i++) {
  bubblePos[i*3] = 8 + (Math.random() - 0.5) * 1.5;
  bubblePos[i*3+1] = 2 + Math.random() * 3;
  bubblePos[i*3+2] = 5 + (Math.random() - 0.5) * 1.5;
}
const bubbleGeo = new THREE.BufferGeometry();
bubbleGeo.setAttribute('position', new THREE.BufferAttribute(bubblePos, 3));
const bubbleMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.y = 2.0 + mod(p.y + uTime * 1.5, 3.0);
      p.x += sin(uTime * 3.0 + position.y) * 0.1;
      gl_PointSize = 10.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = (1.0 - d * 2.0) * 0.8;
      vec3 col = vec3(0.6, 0.2, 0.9);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const bubbles = new THREE.Points(bubbleGeo, bubbleMat);
bubbles.userData.isBubbles = true;
scene.add(bubbles);

const cauldronLight = new THREE.PointLight(0x8800ff, 4, 15);
cauldronLight.position.set(8, 3, 5);
scene.add(cauldronLight);

// Spell books scattered
for (let b = 0; b < 6; b++) {
  const book = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.3, 1.2),
    new THREE.MeshStandardMaterial({ color: 0x220033 + Math.random() * 0x110022 })
  );
  book.position.set(6 + Math.random() * 5, 0.15, 3 + Math.random() * 6);
  book.rotation.y = Math.random() * Math.PI;
  scene.add(book);
}

// Mortar and pestle
const mortar = new THREE.Mesh(
  new THREE.CylinderGeometry(0.5, 0.4, 0.6, 12),
  new THREE.MeshStandardMaterial({ color: 0x4a4a4a })
);
mortar.position.set(10, 0.3, 8);
scene.add(mortar);

const pestle = new THREE.Mesh(
  new THREE.CylinderGeometry(0.08, 0.08, 1.5, 6),
  new THREE.MeshStandardMaterial({ color: 0x3a3a3a })
);
pestle.position.set(10, 1.2, 8);
pestle.rotation.z = 0.3;
scene.add(pestle);

// Herb garden
for (let h = 0; h < 15; h++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 10 + Math.random() * 8;
  const hx = Math.cos(angle) * r;
  const hz = Math.sin(angle) * r;
  
  const plant = new THREE.Mesh(
    new THREE.ConeGeometry(0.2, 0.8 + Math.random() * 0.6, 6),
    new THREE.MeshStandardMaterial({ color: 0x1a4a20 })
  );
  plant.position.set(hx, 0.4, hz);
  scene.add(plant);
}

// Magic circle on ground
const magicCircle = new THREE.Mesh(
  new THREE.RingGeometry(4, 5, 32),
  new THREE.MeshStandardMaterial({ color: 0xaa00ff, emissive: 0x8800cc, emissiveIntensity: 1.5, transparent: true, opacity: 0.7, side: THREE.DoubleSide })
);
magicCircle.rotation.x = -Math.PI / 2;
magicCircle.position.y = 0.02;
scene.add(magicCircle);

const innerCircle = new THREE.Mesh(
  new THREE.CircleGeometry(4, 32),
  new THREE.MeshStandardMaterial({ color: 0x1a0530 })
);
innerCircle.rotation.x = -Math.PI / 2;
innerCircle.position.y = 0.01;
scene.add(innerCircle);

// Pentagram lines
for (let p = 0; p < 5; p++) {
  const angle1 = (p / 5) * Math.PI * 2 - Math.PI / 2;
  const angle2 = ((p + 2) / 5) * Math.PI * 2 - Math.PI / 2;
  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(Math.cos(angle1) * 4, 0.03, Math.sin(angle1) * 4),
    new THREE.Vector3(Math.cos(angle2) * 4, 0.03, Math.sin(angle2) * 4)
  ]);
  const line = new THREE.Mesh(
    lineGeo,
    new THREE.MeshStandardMaterial({ color: 0xcc00ff, emissive: 0xaa00cc, emissiveIntensity: 2.0 })
  );
  scene.add(line);
}

// Dead trees around
for (let t = 0; t < 8; t++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 15 + Math.random() * 15;
  const tx = Math.cos(angle) * r;
  const tz = Math.sin(angle) * r;
  
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.6, 8 + Math.random() * 4, 8),
    new THREE.MeshStandardMaterial({ color: 0x1a0a05 })
  );
  trunk.position.set(tx, 4 + Math.random() * 2, tz);
  trunk.rotation.z = (Math.random() - 0.5) * 0.3;
  scene.add(trunk);
  
  for (let b = 0; b < 4; b++) {
    const branch = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.1, 3 + Math.random() * 2, 6),
      new THREE.MeshStandardMaterial({ color: 0x1a0a05 })
    );
    branch.position.set(tx + (Math.random() - 0.5), 5 + b * 1.5, tz + (Math.random() - 0.5));
    branch.rotation.z = (Math.random() - 0.5) * 1.5;
    scene.add(branch);
  }
}

// Will-o-wisps
const wispCount = 30;
const wispPos = new Float32Array(wispCount * 3);
for (let i = 0; i < wispCount; i++) {
  wispPos[i*3] = (Math.random() - 0.5) * 50;
  wispPos[i*3+1] = 2 + Math.random() * 15;
  wispPos[i*3+2] = (Math.random() - 0.5) * 50;
}
const wispGeo = new THREE.BufferGeometry();
wispGeo.setAttribute('position', new THREE.BufferAttribute(wispPos, 3));
const wispMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.x += sin(uTime * 0.3 + position.z * 0.1) * 1.0;
      p.y += cos(uTime * 0.2 + position.x * 0.1) * 0.6;
      gl_PointSize = 15.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = (1.0 - d * 2.0) * 0.6;
      vec3 col = vec3(0.7, 0.4, 1.0);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const wisps = new THREE.Points(wispGeo, wispMat);
wisps.userData.isWisps = true;
scene.add(wisps);

// Stars
const starCount = 1200;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 150 + Math.random() * 50;
  starPos[i*3] = Math.cos(theta) * r;
  starPos[i*3+1] = 20 + Math.random() * 80;
  starPos[i*3+2] = Math.sin(theta) * r;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.4 })));

// Moon
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(10, 24, 24),
  new THREE.MeshStandardMaterial({ color: 0xd0d0d8, emissive: 0x888888, emissiveIntensity: 0.2 })
);
moon.position.set(40, 60, -80);
scene.add(moon);

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  if (bubbles.userData.isBubbles) bubbles.material.uniforms.uTime.value = t;
  if (wisps.userData.isWisps) wisps.material.uniforms.uTime.value = t;
  
  orbLight.intensity = 4 + Math.sin(t * 3) * 1.5;
  cauldronLight.intensity = 3 + Math.sin(t * 4) * 1.5;
  
  controls.update();
  composer.render();
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
